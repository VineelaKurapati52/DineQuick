
{% extends 'base.html' %}

{% block extra_css %}
<style>
    .kitchen-login-section {
        background: linear-gradient(135deg, #111827 0%, #1f2937 50%, #111827 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
    }

    .kitchen-login-section::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at 50% 50%, rgba(249,115,22,0.08) 0%, transparent 70%);
        pointer-events: none;
    }

    .kitchen-login-container {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 420px;
        padding: 0 20px;
    }

    .kitchen-login-card {
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 16px;
        padding: 48px 32px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        animation: fadeInUp 0.5s ease both;
    }

    .kitchen-login-header {
        text-align: center;
        margin-bottom: 40px;
    }

    .kitchen-login-header .logo-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 56px;
        height: 56px;
        background: rgba(249, 115, 22, 0.15);
        border: 2px solid #F97316;
        border-radius: 12px;
        margin-bottom: 16px;
        font-size: 28px;
        color: #F97316;
    }

    .kitchen-login-header h1 {
        font-size: 28px;
        font-weight: 700;
        color: #ffffff;
        margin: 0 0 8px 0;
    }

    .kitchen-login-header p {
        color: #9ca3af;
        font-size: 14px;
        margin: 0;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        color: #d1d5db;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }

    .input-wrapper i {
        position: absolute;
        left: 14px;
        color: #9ca3af;
        font-size: 18px;
        pointer-events: none;
        transition: color 0.2s;
    }

    .form-control {
        background: #111827;
        border: 1px solid #374151;
        color: #ffffff;
        padding: 12px 14px 12px 44px;
        border-radius: 8px;
        font-size: 15px;
        transition: all 0.2s;
        width: 100%;
    }

    .form-control::placeholder {
        color: #6b7280;
    }

    .form-control:focus {
        background: #111827;
        border-color: #F97316;
        color: #ffffff;
        box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
        outline: none;
    }

    .input-wrapper:has(.form-control:focus) i {
        color: #F97316;
    }

    .btn-kitchen-login {
        width: 100%;
        background: #F97316;
        border: none;
        color: white;
        font-weight: 600;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 15px;
        transition: all 0.3s;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 8px;
    }

    .btn-kitchen-login:hover {
        background: #ea6c0a;
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(249, 115, 22, 0.3);
    }

    .btn-kitchen-login:active {
        transform: translateY(0);
    }

    .btn-kitchen-login:disabled {
        background: #6b7280;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
    }

    .error-message {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid #ef4444;
        color: #fca5a5;
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 14px;
        display: none;
        animation: slideDown 0.3s ease;
    }

    .error-message.show {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .loader {
        display: none;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .btn-kitchen-login.loading .loader {
        display: inline-block;
    }

    .btn-kitchen-login.loading span {
        display: none;
    }

    .kitchen-info {
        background: rgba(249, 115, 22, 0.08);
        border: 1px solid rgba(249, 115, 22, 0.2);
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 12px;
        color: #f59e0b;
        margin-top: 20px;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    @media (max-width: 576px) {
        .kitchen-login-card {
            padding: 40px 24px;
        }

        .kitchen-login-header h1 {
            font-size: 24px;
        }

        .kitchen-login-header .logo-icon {
            width: 48px;
            height: 48px;
            font-size: 24px;
        }
    }
</style>
{% endblock %}

{% block content %}

<section class="kitchen-login-section">
    <div class="kitchen-login-container">
        <div class="kitchen-login-card">
            <!-- Header -->
            <div class="kitchen-login-header">
                <div class="logo-icon">
                    <i class="bi bi-display"></i>
                </div>
                <h1>Kitchen Access</h1>
                <p>Staff login portal</p>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage">
                <i class="bi bi-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <!-- Login Form -->
            <form id="kitchenLoginForm" onsubmit="event.preventDefault(); loginUser()">
                <!-- Username Field -->
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i class="bi bi-person-fill"></i>
                        <input
                            id="username"
                            type="text"
                            class="form-control"
                            placeholder="Enter your username"
                            required
                            autocomplete="username"
                        >
                    </div>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="bi bi-lock-fill"></i>
                        <input
                            id="password"
                            type="password"
                            class="form-control"
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                        >
                    </div>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn-kitchen-login" id="loginBtn">
                    <span>
                        <i class="bi bi-box-arrow-in-right"></i>
                        Access Kitchen
                    </span>
                    <div class="loader"></div>
                </button>
            </form>

            <!-- Kitchen Info -->
            <div class="kitchen-info">
                <i class="bi bi-info-circle"></i>
                Kitchen staff only
            </div>
        </div>
    </div>
</section>

<script>
    async function loginUser() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const loginBtn = document.getElementById("loginBtn");
        const errorMessage = document.getElementById("errorMessage");

        // Validation
        if (!username || !password) {
            showError("Please enter both username and password");
            return;
        }

        // Show loading state
        loginBtn.disabled = true;
        loginBtn.classList.add("loading");

        try {
            const response = await fetch(
                "/api/login",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                }
            );

            const data = await response.json();

            if (response.ok) {
                window.location = "/kitchen";
            } else {
                showError(data.error || "Login failed. Please try again.");
            }
        } catch (error) {
            showError("Connection error. Please try again.");
        } finally {
            // Hide loading state
            loginBtn.disabled = false;
            loginBtn.classList.remove("loading");
        }
    }

    function showError(message) {
        const errorElement = document.getElementById("errorMessage");
        const errorText = document.getElementById("errorText");
        errorText.textContent = message;
        errorElement.classList.add("show");
        setTimeout(() => {
            errorElement.classList.remove("show");
        }, 5000);
    }

    // Enter key to submit
    document.getElementById("kitchenLoginForm").addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
            loginUser();
        }
    });
</script>

{% endblock %}
