
{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

<h2>Register</h2>

<input
id="username"
class="form-control mb-2"
placeholder="Username">

<input
id="email"
class="form-control mb-2"
placeholder="Email">

<input
id="password"
type="password"
class="form-control mb-3"
placeholder="Password">

<button
class="btn btn-success"
onclick="registerUser()">

Register

</button>

</div>

<script>

async function registerUser(){

const response=
await fetch(
"/api/register",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username:
document.getElementById(
"username"
).value,

email:
document.getElementById(
"email"
).value,

password:
document.getElementById(
"password"
).value
})
}
);

const data=
await response.json();

if(response.ok){

alert(
"Registration Successful"
);

window.location="/login";

}
else{

alert(
data.error
);

}

}

</script>

{% endblock %}
