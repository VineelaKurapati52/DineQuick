{% extends 'base.html' %}
{% block title %}Menu – Table {{ table_number }} | DineQuick{% endblock %}

{% block content %}
<div style="background:#111827;min-height:100vh;">

<!-- Menu Header -->
<div class="px-3 pt-4 pb-2" style="background:#1f2937;border-bottom:1px solid #374151;">
    <div class="container-fluid">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
            <div>
                <h4 class="text-white fw-bold mb-0"><i class="bi bi-fork-knife me-2 text-orange"></i>Menu</h4>
                <small class="text-muted">Table <span class="text-orange fw-semibold">#{{ table_number }}</span></small>
            </div>
            <button class="btn btn-orange position-relative px-4" onclick="goToCart()">
                <i class="bi bi-cart3 me-1"></i>Cart
                <span class="cart-badge badge rounded-pill bg-white text-orange ms-1 d-none" id="cartCount">0</span>
            </button>
        </div>
        <!-- Search -->
        <div class="mt-3 position-relative">
            <i class="bi bi-search position-absolute text-muted" style="top:12px;left:14px;"></i>
            <input type="text" id="searchInput" class="form-control ps-5 rounded-pill"
                   style="background:#374151;border:none;color:#fff;"
                   placeholder="Search dishes..." oninput="filterMenu()">
        </div>
    </div>
</div>

<!-- Category Filters -->
<div class="px-3 py-3" style="overflow-x:auto;white-space:nowrap;">
    <div class="d-inline-flex gap-2">
        <button class="btn btn-orange rounded-pill px-4 category-btn active" data-cat="All" onclick="setCategory(this,'All')">All</button>
        {% for cat in categories %}
        <button class="btn btn-outline-secondary rounded-pill px-4 category-btn" data-cat="{{ cat }}" onclick="setCategory(this,'{{ cat }}')">
            {{ cat }}
        </button>
        {% endfor %}
    </div>
</div>

<!-- Menu Grid -->
<div class="container-fluid px-3 pb-5">
    <div id="menuGrid" class="row g-3">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-orange" role="status"></div>
            <p class="text-muted mt-2">Loading menu...</p>
        </div>
    </div>
    <div id="noResults" class="col-12 text-center py-5 d-none">
        <i class="bi bi-search fs-1 text-muted"></i>
        <p class="text-muted mt-2">No items found</p>
    </div>
</div>

</div>

<!-- Item Detail Modal -->
<div class="modal fade" id="itemModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background:#1f2937;border:1px solid #374151;border-radius:16px;">
            <div class="modal-header border-0 pb-0">
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body pt-0" id="modalBody"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const TABLE = {{ table_number }};
</script>
<script src="/static/js/menu.js"></script>
{% endblock %}
